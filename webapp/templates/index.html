<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ Haules</title>
  <style>
    :root {
      --bg:      #0a0a0a;
      --surface: #161616;
      --accent:  #ffaa00;
      --text:    #ffffff;
      --muted:   #777777;
      --border:  #2a2a2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 0;
    }
    .logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 1.25rem;
      opacity: 0.95;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .status-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-badge.on {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-primary {
      display: inline-block;
      font-size: 1rem;
      font-weight: 700;
      color: #0a0a0a;
      background: var(--accent);
      border: none;
      border-radius: 999px;
      padding: 0.9rem 2.5rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost {
      display: inline-block;
      font-size: 0.82rem;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
      text-decoration: none;
      margin-top: 1rem;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { color: var(--text); border-color: #555; }
  </style>
</head>
<body>
  <img src="/static/logo.png" class="logo" alt="Haules">
  <h1>DJ Haules</h1>
  <p class="subtitle">Sistema de Som Automático</p>
  <span class="status-badge {% if status == 'ATIVADO' %}on{% endif %}">{{ status }}</span>
  <a href="/toggle" class="btn-primary">{{ action_text }}</a>
  <a href="/speakers" class="btn-ghost">&#9835; Gerenciar Caixas de Som</a>
  <a href="/wifi" class="btn-ghost">&#8226; Configurar Wi-Fi</a>
</body>
</html>
